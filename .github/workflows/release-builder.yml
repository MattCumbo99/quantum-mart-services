name: Create Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - minor
          - patch

jobs:
  release:
    name: Create new ${{ github.event.inputs.bump }} release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 22
      - name: Construct new version name
        id: newTag
        run: |
          git fetch --tags
          latest=$(git tag --sort=version:refname | tail -n 1)
          currVersion="${latest#v}"
          currVersion="${currVersion%%-*}"
          major=$(echo "$currVersion" | cut -d. -f1)
          minor=$(echo "$currVersion" | cut -d. -f2)
          patch=$(echo "$currVersion" | cut -d. -f3)
          case "${{ github.event.inputs.bump }}" in
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac
          suffix=""
          if [ "$major" -lt 1 ]; then
            suffix="-alpha"
          fi
          newVersion="${major}.${minor}.${patch}${suffix}"
          echo "version=$newVersion" >> $GITHUB_OUTPUT
          if [ "$suffix" = "-alpha" ]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
      - name: Build asset
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -Pversion=${{ steps.newTag.outputs.version }}
      - name: Upload new release
        run: |
          gh release create v${{ steps.newTag.outputs.version }} \
            --generate-notes \
            --prerelease=${{ steps.newTag.outputs.prerelease }} \
            build/libs/qmart-${{ steps.newTag.outputs.version }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
