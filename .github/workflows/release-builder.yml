name: Create Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - minor
          - patch

jobs:
  create_tag:
    name: Create tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.newTag.outputs.version }}
      prerelease: ${{ steps.newTag.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v6
      - name: Construct new version name
        id: newTag
        run: |
          git fetch --tags
          latest=$(git tag --sort=version:refname | tail -n 1)
          currVersion="${latest#v}"
          currVersion="${currVersion%%-*}"
          major=$(echo "$currVersion" | cut -d. -f1)
          minor=$(echo "$currVersion" | cut -d. -f2)
          patch=$(echo "$currVersion" | cut -d. -f3)
          case "${{ github.event.inputs.bump }}" in
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac
          suffix=""
          if [ "$major" -lt 1 ]; then
            suffix="-alpha"
          fi
          newVersion="${major}.${minor}.${patch}${suffix}"
          echo "version=$newVersion" >> $GITHUB_OUTPUT
          if [ "$suffix" = "-alpha" ]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
      - name: Create and upload tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v${{ steps.newTag.outputs.version }}
          git push origin v${{ steps.newTag.outputs.version }}

  release:
    name: Publish new ${{ github.event.inputs.bump }} release
    runs-on: ubuntu-latest
    needs: create_tag
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 22
      - name: Build asset
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -Pversion=${{ needs.create_tag.outputs.version }}
      - name: Create ${{ github.event.inputs.bump }} release
        run: |
          gh release create v${{ needs.create_tag.outputs.version }} \
            --generate-notes \
            --prerelease=${{ needs.create_tag.outputs.prerelease }} \
            build/libs/qmart-${{ needs.create_tag.outputs.version }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
